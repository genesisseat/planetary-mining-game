<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetary Mining Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0a1628;
      color: #e4e4e7;
      overflow: hidden;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(10, 22, 40, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      backdrop-filter: blur(4px);
      z-index: 100;
    }
    #hud-location {
      font-weight: 500;
      margin-bottom: 8px;
      color: #64b5f6;
    }
    .resource-display {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
    }
    .resource-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 8px;
      background: rgba(100, 181, 246, 0.1);
      border-radius: 4px;
    }
    #controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
    }
    button {
      padding: 8px 16px;
      background: rgba(100, 181, 246, 0.15);
      border: 1px solid rgba(100, 181, 246, 0.4);
      border-radius: 6px;
      color: #64b5f6;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    button:hover {
      background: rgba(100, 181, 246, 0.25);
      border-color: rgba(100, 181, 246, 0.6);
    }
    button:active {
      transform: scale(0.98);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #info {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(10, 22, 40, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      backdrop-filter: blur(4px);
      text-align: right;
      max-width: 200px;
    }
    .info-item {
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }
    .info-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  
  <div id="hud">
    <div id="hud-location">Galaxy View</div>
    <div class="resource-display" id="resource-display"></div>
  </div>

  <div id="info">
    <div id="info-fps">FPS: 60</div>
    <div id="info-entities">Entities: 0</div>
    <div id="info-coords" style="font-size: 11px; color: #94a3b8;">--</div>
  </div>

  <div id="controls">
    <button id="zoom-btn" onclick="window.gameInstance.zoom()">Zoom In</button>
    <button id="back-btn" onclick="window.gameInstance.back()" style="display: none;">Back to Galaxy</button>
    <button id="help-btn" onclick="alert('Click planets to select, then zoom in.\nClick ore nodes to mine.\nE = toggle exploration mode')">Help</button>
  </div>

  <!-- Build panel (confirm dialog for placing drills) -->
  <div id="build-panel" style="
    display: none;
    position: fixed;
    background: rgba(10,22,40,0.95);
    border: 1px solid rgba(100,181,246,0.4);
    border-radius: 8px;
    padding: 12px 16px;
    z-index: 200;
    min-width: 200px;
    backdrop-filter: blur(4px);
  ">
    <div id="build-target-name" style="font-weight:600; color:#64b5f6; margin-bottom:8px;"></div>
    <div id="build-options-container"></div>
  </div>

  <style>
    .build-info {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .build-option {
      width: 100%;
      text-align: left;
    }
  </style>

  <script src="bundle.js"></script>
</body>
</html>
